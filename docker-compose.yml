version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: importe-luxe-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: importe_luxe

  backend:
    build: ./backend
    container_name: importe-luxe-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/importe_luxe
    env_file:
      - ./backend/.env
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: importe-luxe-web
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  mongo_data:
